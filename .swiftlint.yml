disabled_rules:
  - trailing_whitespace

opt_in_rules:
  - empty_count
  - force_unwrapping
  - private_outlet
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - implicitly_unwrapped_optional
  - redundant_nil_coalescing
  - fatal_error_message
  - closure_spacing
  - sorted_imports
  - unused_optional_binding
  - unused_closure_parameter
  - vertical_parameter_alignment
  - closure_end_indentation
  - explicit_init
  - first_where
  - number_separator
  - overridden_super_call
  - pattern_matching_keywords
  - private_action
  - strict_fileprivate
  - switch_case_on_newline
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - empty_string
  - flatmap_over_map_reduce
  - last_where
  - reduce_into
  - sorted_first_last
  - toggle_bool
  - unavailable_function
  - unowned_variable_capture
  - weak_delegate
  - discouraged_optional_boolean
  - discouraged_optional_collection
  - modifier_order
  - multiline_arguments
  - prefer_self_in_static_references
  - accessibility_label_for_image

excluded:
  - Pods
  - DerivedData
  - .build
  - fastlane
  - vendor
  - bazel-*
  - Cards/GeneratedMocks.swift
  - "**/checkouts"
  - "**/.build"

line_length:
  warning: 150
  error: 200

function_body_length:
  warning: 60
  error: 100

file_length:
  warning: 400
  error: 600

type_body_length:
  warning: 300
  error: 500

cyclomatic_complexity:
  warning: 15
  error: 25

force_cast: warning
force_try: warning

identifier_name:
  min_length: 2
  excluded:
    - id
    - URL
    - x
    - y
    - i
    - j
    - to
    - at
    - in
    - me
    - or
    - on
    - up
    - if
    - ok
    - db
    - vm
    - vc
    - ui
    - ip
    - qa
    - tv
    - os
    - no
    - by
    - is
    - am
    - pm
    - of
    - as
    - it
    - vs
    - we
    - us
    - my
    - he
    - do
    - be
    - go
    - so
    - an
    - a
    - r
    - s
    - t
    - v
    - w
    - z
    - _

reporter: xcode
