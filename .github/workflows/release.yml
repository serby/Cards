name: Release to App Store

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-26

    steps:
    - uses: actions/checkout@v5

    - name: Install Bazelisk
      run: brew list bazelisk &>/dev/null || brew install bazelisk

    # Bump CFBundleVersion to a strictly-increasing value (UTC seconds since
    # 2026-01-01). Avoids the App Store Connect 409
    # ENTITY_ERROR.ATTRIBUTE.INVALID.DUPLICATE we hit on the first attempt.
    # Annotated tag is the source of truth for release notes ("What's New").
    # Tag name (vX.Y.Z) drives the marketing version. Lightweight tags don't
    # carry a message; require an annotated tag.
    - name: Resolve release metadata
      id: meta
      if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
      run: |
        TAG="${GITHUB_REF#refs/tags/}"
        VERSION="${TAG#v}"
        # `git for-each-ref` returns the annotation body, empty for lightweight tags
        WHATS_NEW=$(git for-each-ref "refs/tags/${TAG}" --format='%(contents)' | sed -e 's/-----BEGIN PGP SIGNATURE-----.*//s' )
        if [[ -z "$WHATS_NEW" ]]; then
          echo "::error::Tag ${TAG} is lightweight or has no message. Use 'git tag -a ${TAG} -m \"release notes\"'."
          exit 1
        fi
        {
          echo "version=${VERSION}"
          echo "whats_new<<EOF"
          echo "${WHATS_NEW}"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"
        echo "Marketing version: ${VERSION}"
        echo "What's New:"
        echo "${WHATS_NEW}"

    - name: Bump CFBundleVersion
      id: build_version
      run: |
        BUILD=$(( ( $(date -u +%s) - 1767225600 ) / 60 ))
        echo "Setting CFBundleVersion to $BUILD"
        /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" Info.plist
        echo "build=${BUILD}" >> "$GITHUB_OUTPUT"

    - name: Install the Apple certificate and provisioning profile
      env:
        BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
        P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
        PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

        echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
        echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

        security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security list-keychain -d user -s $KEYCHAIN_PATH

        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i $PP_PATH))
        cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
        cp $PP_PATH $GITHUB_WORKSPACE/Cards.mobileprovision

    - name: Upload to App Store
      env:
        ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
      run: scripts/deploy-appstore.sh

    # Auto-create the version, attach the build, set release notes, and submit
    # for review. Skipped for workflow_dispatch (no tag = no release notes).
    - name: Submit for review
      if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
      env:
        ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        MARKETING_VERSION: ${{ steps.meta.outputs.version }}
        BUILD_VERSION: ${{ steps.build_version.outputs.build }}
        WHATS_NEW: ${{ steps.meta.outputs.whats_new }}
      run: scripts/asc-submit.sh

    - name: Clean up keychain
      if: ${{ always() }}
      run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db
