name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'Website/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'Website/**'

jobs:
  build-and-test:
    runs-on: macos-26

    steps:
    - uses: actions/checkout@v5

    - name: Install Bazelisk
      run: brew list bazelisk &>/dev/null || brew install bazelisk

    # Pre-create the *exact* simulator name+runtime that rules_apple's test
    # runner will spawn ("New-<DEVICE>-<VERSION>"). When this device already
    # exists and is booted, the runner skips its own creation/boot logic that
    # tends to time out on macos-26 runners.
    - name: Resolve and warm simulator
      id: sim
      run: |
        scripts/ci-resolve-sim.sh >> "$GITHUB_OUTPUT"

    - name: Build
      run: bazel build //Cards:Cards //CardsTests:CardsTests //CardsUITests:CardsUITests

    - name: Test
      run: |
        bazel test //CardsTests:CardsTests //CardsUITests:CardsUITests \
          --ios_simulator_device="${{ steps.sim.outputs.device }}" \
          --ios_simulator_version="${{ steps.sim.outputs.version }}" \
          --test_timeout=900 \
          --flaky_test_attempts=2 \
          --test_output=errors
