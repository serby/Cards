name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'Website/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'Website/**'

jobs:
  build-and-test:
    runs-on: macos-26

    steps:
    - uses: actions/checkout@v5

    - name: Install Bazelisk
      run: brew list bazelisk &>/dev/null || brew install bazelisk

    - name: Resolve simulator
      id: sim
      run: |
        DEVICE=$(xcrun simctl list devices available -j | python3 -c "
        import json, sys, re
        devs = json.load(sys.stdin)['devices']
        for rt, ds in devs.items():
          for d in ds:
            if 'iPhone' in d.get('name','') and d['isAvailable']:
              ver = re.search(r'(\d+(?:-\d+)*)$', rt)
              if ver:
                print(f\"{d['name']}|{ver.group(1).replace('-', '.')}|{d['udid']}\")
                sys.exit()
        ")
        SIM_NAME="${DEVICE%%|*}"
        REST="${DEVICE#*|}"
        SIM_VERSION="${REST%%|*}"
        SIM_UDID="${REST#*|}"
        echo "device=$SIM_NAME" >> "$GITHUB_OUTPUT"
        echo "version=$SIM_VERSION" >> "$GITHUB_OUTPUT"
        echo "Using simulator: $SIM_NAME (iOS $SIM_VERSION) $SIM_UDID"
        xcrun simctl boot "$SIM_UDID" 2>/dev/null || true
        echo "Waiting for simulator to boot..."
        xcrun simctl bootstatus "$SIM_UDID" -b
        echo "Simulator booted."

    - name: Build
      run: bazel build //Cards:Cards

    - name: Test
      run: |
        bazel test //CardsTests:CardsTests \
          --ios_simulator_device="${{ steps.sim.outputs.device }}" \
          --ios_simulator_version="${{ steps.sim.outputs.version }}" \
          --test_output=errors

