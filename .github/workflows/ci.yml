name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'Website/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'Website/**'

jobs:
  build-and-test:
    runs-on: macos-26

    steps:
    - uses: actions/checkout@v5

    - name: Install Bazelisk
      run: brew list bazelisk &>/dev/null || brew install bazelisk

    # Pre-create the *exact* simulator name+runtime that rules_apple's test
    # runner will spawn ("New-<DEVICE>-<VERSION>"). When this device already
    # exists and is booted, the runner skips its own creation/boot logic that
    # tends to time out on macos-26 runners.
    - name: Resolve and warm simulator
      id: sim
      run: |
        scripts/ci-resolve-sim.sh >> "$GITHUB_OUTPUT"

    - name: Build
      run: bazel build //Cards:Cards

    # rules_apple's xctestrunner hangs with "Supported platforms ... is empty"
    # on macos-26 + iOS 26.5 sim. xcodebuild test directly against the
    # rules_xcodeproj output is the path that works locally and on CI.
    - name: Generate Xcode project
      run: |
        bazel run //:xcodeproj
        chmod -R u+w Cards.xcodeproj

    - name: Test
      run: |
        rm -rf /tmp/CardsTests.xcresult
        xcodebuild test \
          -project Cards.xcodeproj \
          -scheme Cards \
          -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.device }},OS=${{ steps.sim.outputs.version }}" \
          -resultBundlePath /tmp/CardsTests.xcresult \
          -retry-tests-on-failure \
          -test-iterations 2

    - name: Upload test result bundle
      if: ${{ failure() }}
      uses: actions/upload-artifact@v4
      with:
        name: CardsTests.xcresult
        path: /tmp/CardsTests.xcresult
