<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo - Cards</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .demo {
      max-width: 600px;
      margin: 0 auto;
      padding: 4rem 2rem;
      text-align: center;
    }
    .demo h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    .demo .intro {
      color: var(--text-secondary);
      margin-bottom: 3rem;
    }
    .code-card {
      background: var(--bg-alt);
      padding: 2rem;
      border-radius: 16px;
      margin-bottom: 2rem;
    }
    .code-card h2 {
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
    }
    .code-card p {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    .code-card canvas, .code-card svg, .code-card #qrcode {
      max-width: 250px;
      height: auto;
      background: white;
      padding: 1rem;
      border-radius: 8px;
      display: inline-block;
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <span class="logo">Cards</span>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="privacy.html">Privacy</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <div class="demo">
      <h1>App Review Demo</h1>
      <p class="intro">Use these codes to test the Cards app scanner.</p>

      <div class="code-card">
        <h2>Barcode (EAN-13)</h2>
        <p>Sample loyalty card: 5012345678900</p>
        <svg id="barcode"></svg>
      </div>

      <div class="code-card">
        <h2>QR Code</h2>
        <p>Sample membership: CARDS-DEMO-2024</p>
        <div id="qrcode"></div>
      </div>

      <p style="color: var(--text-secondary); font-size: 0.9rem;">
        Open the Cards app, tap + to add a card, and scan either code above.
      </p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    JsBarcode("#barcode", "5012345678900", { format: "EAN13", width: 2, height: 80 });
    new QRCode(document.getElementById("qrcode"), { text: "CARDS-DEMO-2024", width: 200, height: 200 });
  </script>
</body>
</html>
