<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo - Cards</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .demo {
      max-width: 600px;
      margin: 0 auto;
      padding: 4rem 2rem;
      text-align: center;
    }
    .demo h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    .demo .intro {
      color: var(--text-secondary);
      margin-bottom: 3rem;
    }
    .code-card {
      background: var(--bg-alt);
      padding: 2rem;
      border-radius: 16px;
      margin-bottom: 2rem;
    }
    .code-card h2 {
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
    }
    .code-card p {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    .code-card svg {
      max-width: 200px;
      height: auto;
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <span class="logo">Cards</span>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="privacy.html">Privacy</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <div class="demo">
      <h1>App Review Demo</h1>
      <p class="intro">Use these codes to test the Cards app scanner.</p>

      <div class="code-card">
        <h2>Barcode (EAN-13)</h2>
        <p>Sample loyalty card: 5012345678900</p>
        <svg viewBox="0 0 200 100">
          <!-- EAN-13 barcode for 5012345678900 -->
          <rect fill="white" width="200" height="100"/>
          <g fill="black">
            <!-- Start guard -->
            <rect x="10" y="10" width="2" height="60"/>
            <rect x="14" y="10" width="2" height="60"/>
            <!-- Left digits (501234) -->
            <rect x="18" y="10" width="2" height="55"/>
            <rect x="22" y="10" width="2" height="55"/>
            <rect x="26" y="10" width="4" height="55"/>
            <rect x="32" y="10" width="2" height="55"/>
            <rect x="36" y="10" width="4" height="55"/>
            <rect x="42" y="10" width="2" height="55"/>
            <rect x="46" y="10" width="2" height="55"/>
            <rect x="50" y="10" width="4" height="55"/>
            <rect x="56" y="10" width="2" height="55"/>
            <rect x="60" y="10" width="2" height="55"/>
            <rect x="64" y="10" width="4" height="55"/>
            <rect x="70" y="10" width="2" height="55"/>
            <rect x="74" y="10" width="2" height="55"/>
            <rect x="78" y="10" width="4" height="55"/>
            <!-- Center guard -->
            <rect x="86" y="10" width="2" height="60"/>
            <rect x="90" y="10" width="2" height="60"/>
            <!-- Right digits (567890) -->
            <rect x="96" y="10" width="4" height="55"/>
            <rect x="102" y="10" width="2" height="55"/>
            <rect x="106" y="10" width="2" height="55"/>
            <rect x="110" y="10" width="4" height="55"/>
            <rect x="116" y="10" width="2" height="55"/>
            <rect x="120" y="10" width="4" height="55"/>
            <rect x="126" y="10" width="2" height="55"/>
            <rect x="130" y="10" width="2" height="55"/>
            <rect x="134" y="10" width="4" height="55"/>
            <rect x="140" y="10" width="2" height="55"/>
            <rect x="144" y="10" width="4" height="55"/>
            <rect x="150" y="10" width="2" height="55"/>
            <rect x="154" y="10" width="2" height="55"/>
            <rect x="158" y="10" width="4" height="55"/>
            <rect x="164" y="10" width="2" height="55"/>
            <rect x="168" y="10" width="2" height="55"/>
            <rect x="172" y="10" width="4" height="55"/>
            <!-- End guard -->
            <rect x="180" y="10" width="2" height="60"/>
            <rect x="184" y="10" width="2" height="60"/>
          </g>
          <text x="100" y="85" text-anchor="middle" font-family="monospace" font-size="12">5012345678900</text>
        </svg>
      </div>

      <div class="code-card">
        <h2>QR Code</h2>
        <p>Sample membership: CARDS-DEMO-2024</p>
        <svg viewBox="0 0 200 200">
          <!-- QR code for CARDS-DEMO-2024 -->
          <rect fill="white" width="200" height="200"/>
          <g fill="black">
            <!-- Top-left finder pattern -->
            <rect x="20" y="20" width="42" height="6"/>
            <rect x="20" y="56" width="42" height="6"/>
            <rect x="20" y="20" width="6" height="42"/>
            <rect x="56" y="20" width="6" height="42"/>
            <rect x="32" y="32" width="18" height="18"/>
            <!-- Top-right finder pattern -->
            <rect x="138" y="20" width="42" height="6"/>
            <rect x="138" y="56" width="42" height="6"/>
            <rect x="138" y="20" width="6" height="42"/>
            <rect x="174" y="20" width="6" height="42"/>
            <rect x="150" y="32" width="18" height="18"/>
            <!-- Bottom-left finder pattern -->
            <rect x="20" y="138" width="42" height="6"/>
            <rect x="20" y="174" width="42" height="6"/>
            <rect x="20" y="138" width="6" height="42"/>
            <rect x="56" y="138" width="6" height="42"/>
            <rect x="32" y="150" width="18" height="18"/>
            <!-- Timing patterns -->
            <rect x="68" y="44" width="6" height="6"/>
            <rect x="80" y="44" width="6" height="6"/>
            <rect x="92" y="44" width="6" height="6"/>
            <rect x="104" y="44" width="6" height="6"/>
            <rect x="116" y="44" width="6" height="6"/>
            <rect x="128" y="44" width="6" height="6"/>
            <rect x="44" y="68" width="6" height="6"/>
            <rect x="44" y="80" width="6" height="6"/>
            <rect x="44" y="92" width="6" height="6"/>
            <rect x="44" y="104" width="6" height="6"/>
            <rect x="44" y="116" width="6" height="6"/>
            <rect x="44" y="128" width="6" height="6"/>
            <!-- Data modules (simplified pattern) -->
            <rect x="68" y="68" width="6" height="6"/>
            <rect x="80" y="68" width="6" height="6"/>
            <rect x="104" y="68" width="6" height="6"/>
            <rect x="128" y="68" width="6" height="6"/>
            <rect x="68" y="80" width="6" height="6"/>
            <rect x="92" y="80" width="6" height="6"/>
            <rect x="116" y="80" width="6" height="6"/>
            <rect x="140" y="80" width="6" height="6"/>
            <rect x="80" y="92" width="6" height="6"/>
            <rect x="104" y="92" width="6" height="6"/>
            <rect x="128" y="92" width="6" height="6"/>
            <rect x="152" y="92" width="6" height="6"/>
            <rect x="68" y="104" width="6" height="6"/>
            <rect x="92" y="104" width="6" height="6"/>
            <rect x="116" y="104" width="6" height="6"/>
            <rect x="140" y="104" width="6" height="6"/>
            <rect x="164" y="104" width="6" height="6"/>
            <rect x="80" y="116" width="6" height="6"/>
            <rect x="104" y="116" width="6" height="6"/>
            <rect x="128" y="116" width="6" height="6"/>
            <rect x="152" y="116" width="6" height="6"/>
            <rect x="68" y="128" width="6" height="6"/>
            <rect x="92" y="128" width="6" height="6"/>
            <rect x="116" y="128" width="6" height="6"/>
            <rect x="140" y="128" width="6" height="6"/>
            <rect x="164" y="128" width="6" height="6"/>
            <rect x="80" y="140" width="6" height="6"/>
            <rect x="104" y="140" width="6" height="6"/>
            <rect x="128" y="140" width="6" height="6"/>
            <rect x="152" y="140" width="6" height="6"/>
            <rect x="68" y="152" width="6" height="6"/>
            <rect x="92" y="152" width="6" height="6"/>
            <rect x="116" y="152" width="6" height="6"/>
            <rect x="140" y="152" width="6" height="6"/>
            <rect x="164" y="152" width="6" height="6"/>
            <rect x="80" y="164" width="6" height="6"/>
            <rect x="104" y="164" width="6" height="6"/>
            <rect x="128" y="164" width="6" height="6"/>
            <rect x="152" y="164" width="6" height="6"/>
          </g>
        </svg>
      </div>

      <p style="color: var(--text-secondary); font-size: 0.9rem;">
        Open the Cards app, tap + to add a card, and scan either code above.
      </p>
    </div>
  </main>
</body>
</html>
